<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InvestiPlay — Learn Money Skills That Last</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #06291f;
    --forest: #0a3d2e;
    --emerald: #15604a;
    --emerald-2: #1c8059;
    --leaf: #2bb673;
    --up: #14a05b;
    --down: #e0524a;
    --gold: #e0a52e;
    --gold-soft: #fbf1d6;
    --mint: #e7f0ea;
    --mint-2: #dcebe0;
    --paper: #f6fbf7;
    --white: #ffffff;
    --dark: #08130e;
    --dark-2: #102219;
    --line: rgba(10, 61, 46, 0.12);
    --shadow-sm: 0 1px 2px rgba(6, 41, 31, 0.06), 0 4px 14px rgba(6, 41, 31, 0.05);
    --shadow-md: 0 8px 30px rgba(6, 41, 31, 0.10);
    --shadow-lg: 0 24px 70px rgba(6, 41, 31, 0.18);
    --r-lg: 28px;
    --r-md: 20px;
    --r-sm: 14px;
    --maxw: 1200px;
    --accent: var(--emerald);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    color: var(--ink);
    background: var(--mint);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  .mono { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }
  ::selection { background: var(--leaf); color: #042018; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .wrap { padding: 0 20px; } }

  /* ---------- Wordmark ---------- */
  .wordmark {
    font-weight: 800;
    letter-spacing: -0.03em;
    font-size: 1.5rem;
    color: var(--forest);
    display: inline-flex;
    align-items: center;
    line-height: 1;
  }
  .wordmark .play { color: var(--emerald-2); }
  .wordmark--light { color: #eafff5; }
  .wordmark--light .play { color: var(--leaf); }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 9px;
    font-weight: 700; font-size: 0.98rem;
    padding: 14px 24px; border-radius: 999px;
    transition: transform .18s cubic-bezier(.2,.9,.3,1.2), box-shadow .2s, background .2s, color .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent); color: #f3fff9;
    box-shadow: 0 8px 22px rgba(21, 96, 74, 0.32);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(21,96,74,.42); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .btn-dark { background: var(--ink); color: #eafff5; }
  .btn-dark:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .btn-gold { background: var(--gold); color: #3a2a06; box-shadow: 0 8px 22px rgba(224,165,46,.32); }
  .btn-gold:hover { transform: translateY(-2px); }

  /* ---------- Section scaffolding ---------- */
  section { position: relative; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--emerald); padding: 7px 14px; border-radius: 999px;
    background: rgba(21,96,74,0.08);
  }
  .sec-title { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin: 18px 0 0; }
  .sec-sub { font-size: 1.1rem; color: rgba(6,41,31,.66); max-width: 56ch; line-height: 1.5; margin: 16px 0 0; }

  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s ease, transform .7s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1 !important; transform: none !important; } }
  body.no-motion .reveal { opacity: 1 !important; transform: none !important; }

  .pill-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: .8rem; font-weight: 700; padding: 6px 12px; border-radius: 999px;
  }

  /* card base */
  .card { background: var(--white); border-radius: var(--r-md); border: 1px solid var(--line); box-shadow: var(--shadow-sm); }

  #root { position: relative; z-index: 1; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: rgba(10,61,46,.22); border-radius: 99px; border: 3px solid var(--mint); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* keyframes */
  @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes floaty2 { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-16px) rotate(-3deg); } }
  @keyframes spinSlow { to { transform: rotate(360deg); } }
  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.7); } }
  @keyframes pop { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shimmer { to { background-position: 200% 0; } }
  @keyframes coinFlip { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
  @keyframes riseUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  body.no-motion *,
  body.no-motion *::before,
  body.no-motion *::after { animation-duration: 0.001s !important; animation-iteration-count: 1 !important; }

  body.has-cursor, body.has-cursor a, body.has-cursor button, body.has-cursor .feat-card, body.has-cursor [data-cur] { cursor: none !important; }
  body.has-cursor input, body.has-cursor textarea { cursor: text !important; }
  @keyframes drawLineG { to { stroke-dashoffset: 0; } }

  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .5; z-index: 0;
    background-image: radial-gradient(rgba(10,61,46,.05) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  /* ---------- Jeff mascot ---------- */
  .jeff-idle { animation: jeffBob 3.6s ease-in-out infinite; }
  @keyframes jeffBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  .jeff-eyes { transform-box: fill-box; transform-origin: center; animation: jeffBlink 4.6s infinite; }
  @keyframes jeffBlink { 0%,93%,100% { transform: scaleY(1); } 96% { transform: scaleY(.12); } }
  .jeff-pop { animation: pop .5s ease both; }
  .ptile { animation: pop .5s ease both; }
  body.no-motion .jeff-idle, body.no-motion .jeff-eyes { animation: none !important; }

  /* ---------- intro scenes ---------- */
  .scene-row { display: flex; align-items: center; justify-content: center; gap: clamp(18px,4vw,56px); flex-wrap: wrap; }
  .scene-jeff { flex-shrink: 0; }
  @media (max-width: 720px) { .scene-jeff svg { width: 160px; height: 160px; } }

  .intro-word {
    color: #eafff5; font-weight: 800; letter-spacing: -.05em; margin: 0; line-height: .92;
    font-size: clamp(4rem, 22vw, 17rem); text-align: center;
    text-shadow: 0 0 60px rgba(43,182,115,.25);
  }

  /* ---------- financial-literacy frame ---------- */
  .fin-bg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .fin-line { stroke-dasharray: 1600; stroke-dashoffset: 1600; animation: drawLineG 2.4s ease forwards .4s; }
  body.no-motion .fin-line { animation: none; stroke-dashoffset: 0; }
  .finlit-glow {
    position: absolute; left: 50%; top: 46%; transform: translate(-50%,-50%);
    width: min(880px, 92vw); height: 360px; z-index: 1; pointer-events: none;
    background: radial-gradient(closest-side, rgba(63,224,143,.30), rgba(63,224,143,.08) 55%, transparent 75%);
    filter: blur(8px); animation: glowPulse 4.5s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100% { opacity: .7; } 50% { opacity: 1; } }
  .finlit-title {
    font-size: clamp(2.6rem, 8.5vw, 6.6rem); font-weight: 800; letter-spacing: -.045em; margin: 0; line-height: 1;
    background: linear-gradient(100deg, #3fe08f, #8df0b6 42%, #ffe14d);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 30px rgba(63,224,143,.5));
  }
  .finlit-jeff { position: absolute; left: 50%; bottom: max(4vh, 26px); transform: translateX(-50%); z-index: 3; transition: transform .2s linear; }

  /* ---------- cursor glow (yellow during climax) ---------- */
  .cursor-glow {
    position: fixed; top: 0; left: 0; width: 76px; height: 76px; border-radius: 50%;
    pointer-events: none; z-index: 9400; opacity: 0; transition: opacity .45s;
    background: radial-gradient(circle, rgba(255,221,64,.6), rgba(255,210,40,.18) 52%, transparent 72%);
    mix-blend-mode: screen; filter: blur(2px);
  }
  body.climax-cursor .cursor-glow { opacity: 1; }

  /* ---------- InvestiPlay climax ---------- */
  .climax-word {
    font-size: clamp(3.4rem, 15vw, 14rem); font-weight: 800; letter-spacing: -.04em;
    color: #ffe14d; opacity: 0; transform: scale(.84);
    transition: opacity 1s ease, transform 1.3s cubic-bezier(.18,.85,.25,1);
    text-shadow: 0 0 26px rgba(255,225,77,.75), 0 0 70px rgba(255,200,30,.55), 0 0 150px rgba(255,170,15,.4);
  }
  .climax-word span { color: #fff4b0; }
  .climax-word.on { opacity: 1; transform: scale(1); animation: climaxFlicker 2.4s ease .25s both; }
  @keyframes climaxFlicker { 0%{opacity:.15;} 7%{opacity:1;} 11%{opacity:.4;} 16%{opacity:1;} 24%{opacity:.7;} 30%{opacity:1;} 100%{opacity:1;} }
  .climax-hint {
    position: absolute; bottom: 46px; left: 50%; transform: translateX(-50%);
    color: rgba(255,225,77,.55); font-size: .78rem; letter-spacing: .22em; text-transform: uppercase;
    opacity: 0; transition: opacity .7s 1.5s;
  }
  .climax-hint.on { opacity: 1; }
  body.no-motion .climax-word { transition: none; animation: none; }

  /* climax: party Jeff + confetti */
  .climax-jeff {
    position: absolute; bottom: 11%; left: 50%;
    transform: translateX(-50%) translateY(40px) scale(.7);
    opacity: 0; transition: opacity .6s ease .5s, transform .8s cubic-bezier(.2,1.5,.35,1) .5s;
    z-index: 6; pointer-events: none;
  }
  .climax-jeff.on { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  .jeff-blower { animation: blowerToot 1.1s ease-in-out .6s infinite; }
  @keyframes blowerToot { 0%,100% { transform: scaleX(.42); } 35% { transform: scaleX(1); } 70% { transform: scaleX(.7); } }
  @keyframes confettiPop {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4) rotate(0deg); }
    8%   { opacity: 1; }
    22%  { transform: translate(calc(-50% + var(--ux)), calc(-50% + var(--uy))) scale(1) rotate(calc(var(--rot) * .35)); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot)); }
  }
  body.no-motion .climax-jeff { transition: none; transform: translateX(-50%); opacity: 1; }
  body.no-motion .jeff-blower { animation: none; }
  body.no-motion .confetti-bit { display: none; }

  /* ---------- intro "Next" button ---------- */
  .intro-next {
    position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 20px; border-radius: 999px; cursor: pointer;
    background: #3fe08f; color: #042018; font-weight: 800; font-size: .92rem; letter-spacing: .01em;
    border: none; box-shadow: 0 10px 26px rgba(63,224,143,.32);
    transition: opacity .3s, transform .18s, box-shadow .2s, background .2s, bottom .35s;
  }
  .intro-next svg { animation: nextNudge 1.8s ease-in-out infinite; }
  .intro-next:hover { background: #54e89d; transform: translateX(-50%) translateY(-2px); box-shadow: 0 14px 30px rgba(63,224,143,.42); }
  .intro-next:active { transform: translateX(-50%) translateY(0); }
  @keyframes nextNudge { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }
  body.no-motion .intro-next svg { animation: none; }

  /* ---------- first-slide "Press Next" hint ---------- */
  .intro-firsthint {
    position: absolute; bottom: 188px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: opacity .4s ease;
  }
  .intro-firsthint-label {
    font-size: .95rem; font-weight: 700; letter-spacing: .01em; color: #bdf3d4;
    background: rgba(63,224,143,.1); border: 1px solid rgba(63,224,143,.28);
    padding: 8px 18px; border-radius: 999px; white-space: nowrap;
  }
  .intro-firsthint-label strong { color: #4fd99b; }
  .intro-firsthint-arrow { animation: firstHintBounce 1.3s ease-in-out infinite; filter: drop-shadow(0 4px 10px rgba(63,224,143,.5)); }
  @keyframes firstHintBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(9px); } }
  body.no-motion .intro-firsthint-arrow { animation: none; }

  /* ---------- Idea→Life (Lusion-style squiggle section) ---------- */
  .ideal { background: var(--paper); }
  .squiggle { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .ideal-title {
    position: relative; z-index: 1; text-align: left; margin: 0;
    width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; padding: 0 max(5vw, 28px);
    font-weight: 800; letter-spacing: -.05em; line-height: .96;
    font-size: clamp(2.8rem, 11vw, 10rem); color: var(--ink);
    text-wrap: balance;
  }
  .ideal-title span { color: var(--emerald-2); }
  .ideal-eyebrow { position: absolute; left: max(5vw, 28px); top: max(12vh, 104px); z-index: 1; }
  .ideal-jeff { position: absolute; left: max(5vw, 28px); bottom: max(7vh, 40px); z-index: 1; }
  @media (max-width: 900px) { .ideal-jeff { opacity: .9; left: 16px; bottom: 24px; } .ideal-jeff svg { width: 110px; height: 110px; } }

  /* ---------- Facts reel (Mana-style pinned horizontal scroll) ---------- */
  .reel-pin { position: sticky; top: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .reel-head { flex: 0 0 auto; padding: clamp(38px, 6vh, 72px) 24px 0; z-index: 4; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
  .reel-title { margin: 0; font-weight: 800; letter-spacing: -.04em; font-size: clamp(1.9rem, 4.2vw, 3.4rem); color: var(--ink); line-height: 1.02; }
  .reel-title span { color: var(--emerald-2); }
  .reel-prog { width: min(280px, 60vw); height: 4px; border-radius: 99px; background: rgba(10,61,46,.12); overflow: hidden; }
  .reel-prog-fill { display: block; height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, var(--leaf), var(--gold)); }

  .reel-viewport { flex: 1 1 auto; min-height: 0; display: flex; align-items: center; overflow: visible; z-index: 2; }
  .reel-track { display: flex; align-items: center; gap: clamp(240px, 40vw, 620px); padding: 0 36vw 0 36vw; will-change: transform; }
  .reel-card {
    flex: 0 0 auto; width: clamp(300px, 33vw, 450px); height: clamp(300px, 46vh, 500px);
    border-radius: 30px; padding: clamp(24px, 2.2vw, 38px); display: flex; flex-direction: column; justify-content: space-between;
    box-shadow: 0 26px 60px rgba(6,41,31,.18), inset 0 1px 0 rgba(255,255,255,.16); will-change: transform; transform-origin: center center;
  }
  .reel-card-top { display: flex; align-items: center; gap: 12px; }
  .reel-chip { width: 46px; height: 46px; border-radius: 13px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .reel-kicker { font-size: .82rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
  .reel-num { margin-left: auto; font-weight: 800; font-size: 1.1rem; font-feature-settings: "tnum"; }
  .reel-stat-wrap { display: flex; flex-direction: column; gap: 2px; }
  .reel-stat { font-weight: 800; letter-spacing: -.05em; line-height: .9; font-size: clamp(3.2rem, 6.4vw, 5.6rem); }
  .reel-unit { font-size: clamp(1rem, 1.4vw, 1.35rem); font-weight: 700; }
  .reel-line { margin: 0; font-size: clamp(.98rem, 1.25vw, 1.18rem); line-height: 1.5; opacity: .9; max-width: 28ch; }

  .reel-jeff-stage { flex: 0 0 auto; position: relative; height: clamp(150px, 22vh, 270px); perspective: 900px; display: flex; align-items: flex-end; justify-content: center; z-index: 3; pointer-events: none; }
  .reel-jeff-disc { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: clamp(260px, 26vw, 400px); height: clamp(260px, 26vw, 400px); border-radius: 50%; background: radial-gradient(closest-side, rgba(63,224,143,.30), rgba(63,224,143,.06) 60%, transparent 72%); filter: blur(4px); }
  .reel-jeff-spin { position: relative; transform-style: preserve-3d; will-change: transform; transform-origin: center bottom; filter: drop-shadow(0 24px 30px rgba(6,41,31,.28)); }
  .reel-hint { position: absolute; bottom: 18px; right: 24px; z-index: 5; color: rgba(6,41,31,.45); font-size: .74rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; pointer-events: none; }
  @media (max-width: 760px) {
    .reel-track { padding: 0 30vw 0 8vw; }
    .reel-jeff-spin svg { width: 150px; height: 150px; }
  }
  .ideal-sub {
    position: absolute; right: max(5vw, 28px); bottom: max(8vh, 48px); z-index: 1;
    max-width: 40ch; margin: 0; text-align: left;
    color: rgba(6,41,31,.66); font-size: clamp(1.12rem, 1.55vw, 1.45rem); line-height: 1.5;
  }
  @media (max-width: 700px) {
    .ideal-sub { right: 24px; left: 24px; max-width: none; bottom: 40px; }
    .ideal-eyebrow { top: 84px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Asset map used by the parts. The original economy-banner image exceeded the
